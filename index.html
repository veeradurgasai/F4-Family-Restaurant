<body>

<header>
<nav>

<div class="logo">
<img src="r_logo.jpg">

</div>

<div class="b">
<a href="index.html" class="b1">HOME</a>
<a href="menu.html" class="b1">MENU</a>
<a href="gallery.html" class="b1">GALLERY</a>

<a href="log.html" class="but">LOGIN/REGISTER</a>
</div>

</nav>
</header>

<main>

<div class="hero-text">

<h1>BEST QUALITY FOOD</h1>

<p>
Our restaurant strictly adheres to top-tier hygiene regulations, with staff wearing clean uniforms, using gloves, and maintaining rigorous hand hygiene for every dish prepared
</p>

<br>

<button class="book-btn">BOOK A TABLE</button>

</div>

</main>

<footer>
</footer>

<!-- ✅ ALL JS MUST BE HERE -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    // Button click
    const btn = document.querySelector(".book-btn");
    if (btn) {
        btn.addEventListener("click", function(){
            alert("Table Booked Successfully!");
            window.location.href = "book.html";
        });
    }

    // Session handling
    const sessionData = sessionStorage.getItem("f4_session");
    const logoTitle = document.getElementById("n");

    if (sessionData) {
        const user = JSON.parse(sessionData);
        logoTitle.innerText = "HELLO, " + user.user.toUpperCase();

        const loginLink = document.querySelector('a[href="log.html"]');
        if (loginLink) {
            loginLink.innerText = "LOGOUT";
            loginLink.href = "#";
            loginLink.onclick = () => {
                sessionStorage.removeItem("f4_session");
                location.reload();
            };
        }
    }

});

</script>

</body>
</html>
